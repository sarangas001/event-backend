name: Hello Backend App to AWS EKS CI/CD

on:
  workflow_dispatch:

env:
    MONGIDB_URI: ${{ secrets.MONGIDB_URI }}
    JWT_SECRET: ${{ secrets.JWT_SECRET }}
    SMTP_USER: ${{ secrets.SMTP_USER }}
    SMTP_PASS: ${{ secrets.SMTP_PASS }}
    SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
    CLOUD_NAME: ${{ secrets.CLOUD_NAME }}
    CLOUD_API_KEY: ${{ secrets.CLOUD_API_KEY }}
    CLOUD_API_SECRET: ${{ secrets.CLOUD_API_SECRET }}

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6


      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
            node-version: '25'

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests (If any)
        working-directory: backend
        run: npm test --if-present
  
  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: backend
          push: true
          tags: |
                ${{ secrets.DOCKER_USERNAME }}/backend-event:latest

  docker-aws-eks:
        runs-on: ubuntu-latest
        needs: docker-build-push
    
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v6.1.0
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ap-south-1
            
            - name: Setup kubectl
              uses: azure/setup-kubectl@v4
            
            - name: Update kubeconfig for EKS
              run: |
                  aws eks update-kubeconfig --name backend-event --region ap-south-1
            
            - name: Verify connection
              run: kubectl get nodes

            - name: Deploy to AWS (Kubernetes)
              run: kubectl apply -f k8s/app.yaml